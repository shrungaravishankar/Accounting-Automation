<!-- ====== AUTH WRAPPER (added for login gating) ====== -->
<style>
@keyframes auth-spin { to { transform: rotate(360deg); } }
.auth-overlay { position:fixed; inset:0; background:#0a0b14; display:flex; align-items:center; justify-content:center; padding:24px; z-index:99999; font-family:'IBM Plex Sans',-apple-system,sans-serif; }
.auth-spinner { width:40px; height:40px; border:3px solid rgba(255,255,255,.1); border-top-color:#3b82f6; border-radius:50%; animation:auth-spin 1s linear infinite; }
.auth-card { background:#12131f; border:1px solid #3a3560; border-radius:14px; padding:36px 32px; width:100%; max-width:380px; }
.auth-title { text-align:center; font-size:22px; font-weight:600; color:#3b82f6; margin-bottom:4px; }
.auth-sub { text-align:center; font-size:13px; color:#9ca3af; margin-bottom:24px; }
.auth-field { margin-bottom:14px; }
.auth-label { font-size:13px; color:#9ca3af; display:block; margin-bottom:5px; }
.auth-input { width:100%; padding:10px 13px; border:1px solid #3a3560; border-radius:6px; background:#0a0b14; color:#e5e7eb; font-size:14px; outline:none; font-family:inherit; }
.auth-input:focus { border-color:#3b82f6; }
.auth-error { background:#3d1a1a; color:#fca5a5; border:1px solid #5a2a2a; padding:11px 15px; border-radius:6px; font-size:13px; margin-bottom:12px; }
.auth-btn { width:100%; padding:11px 18px; background:#3b82f6; color:white; border:none; border-radius:6px; font-size:14px; font-weight:500; cursor:pointer; }
.auth-btn:hover { background:#2563eb; }
.auth-btn:disabled { opacity:.55; cursor:not-allowed; }
.auth-user-menu { position:fixed; top:10px; right:14px; z-index:90000; font-family:'IBM Plex Sans',sans-serif; }
.auth-avatar { width:34px; height:34px; border-radius:50%; background:linear-gradient(135deg,#3b82f6,#6366f1); color:#fff; border:1px solid #374151; font-size:13px; font-weight:600; cursor:pointer; display:flex; align-items:center; justify-content:center; letter-spacing:.5px; transition:transform .15s ease, box-shadow .15s ease; }
.auth-avatar:hover { transform:scale(1.05); box-shadow:0 0 0 3px rgba(59,130,246,.25); }
.auth-dropdown { position:absolute; top:42px; right:0; min-width:220px; background:#12131f; border:1px solid #3a3560; border-radius:8px; box-shadow:0 8px 24px rgba(0,0,0,.45); padding:6px; opacity:0; visibility:hidden; transform:translateY(-4px); transition:opacity .15s ease, transform .15s ease, visibility .15s; }
.auth-dropdown.auth-open { opacity:1; visibility:visible; transform:translateY(0); }
.auth-dd-user { padding:10px 12px 8px; border-bottom:1px solid #2a2b3a; margin-bottom:4px; }
.auth-dd-name { font-size:13px; color:#e5e7eb; font-weight:500; line-height:1.3; word-break:break-word; }
.auth-dd-email { font-size:11px; color:#9ca3af; margin-top:2px; word-break:break-all; }
.auth-dd-role { display:inline-block; margin-top:6px; font-size:10px; color:#a5b4fc; background:#1e1b4b; padding:2px 7px; border-radius:10px; text-transform:uppercase; letter-spacing:.5px; }
.auth-dd-item { display:flex; align-items:center; gap:8px; padding:9px 12px; font-size:13px; color:#e5e7eb; cursor:pointer; border-radius:5px; background:transparent; border:none; width:100%; text-align:left; font-family:inherit; }
.auth-dd-item:hover { background:#1f2937; color:#fca5a5; }
.auth-hidden { display:none !important; }
</style>

<div id="boot-spinner" class="auth-overlay" style="flex-direction:column;gap:14px;">
  <div class="auth-spinner"></div>
  <div id="boot-msg" style="font-size:13px;color:#9ca3af;">Loading…</div>
</div>

<div id="login-wrap" class="auth-overlay auth-hidden">
  <div class="auth-card">
    <div class="auth-title">BCL AutoLedger</div>
    <div class="auth-sub">Sign in to access the tool</div>
    <div class="auth-field"><label class="auth-label">Email</label><input type="email" id="login-email" class="auth-input" placeholder="you@bcl.ae" autocomplete="username"/></div>
    <div class="auth-field"><label class="auth-label">Password</label><input type="password" id="login-pwd" class="auth-input" placeholder="••••••" autocomplete="current-password"/></div>
    <div id="login-error" class="auth-error auth-hidden"></div>
    <button class="auth-btn" id="login-btn">Sign in →</button>
  </div>
</div>

<div id="newpw-wrap" class="auth-overlay auth-hidden">
  <div class="auth-card">
    <div class="auth-title" style="font-size:18px;">Choose a new password</div>
    <div class="auth-sub">First time signing in. Set a permanent password.</div>
    <div class="auth-field"><label class="auth-label">New password</label><input type="password" id="newpw-pwd" class="auth-input" placeholder="Min 8 characters" autocomplete="new-password"/></div>
    <div class="auth-field"><label class="auth-label">Confirm</label><input type="password" id="newpw-pwd2" class="auth-input" placeholder="Repeat" autocomplete="new-password"/></div>
    <div id="newpw-error" class="auth-error auth-hidden"></div>
    <button class="auth-btn" id="newpw-btn">Save & continue →</button>
  </div>
</div>

<div id="auth-user-menu" class="auth-user-menu auth-hidden">
  <button id="auth-avatar" class="auth-avatar" type="button" aria-haspopup="true" aria-expanded="false" aria-label="Open user menu">U</button>
  <div id="auth-dropdown" class="auth-dropdown" role="menu">
    <div class="auth-dd-user">
      <div id="auth-dd-name" class="auth-dd-name">User</div>
      <div id="auth-dd-email" class="auth-dd-email">&nbsp;</div>
      <span id="auth-dd-role" class="auth-dd-role">role</span>
    </div>
    <button id="auth-signout-btn" class="auth-dd-item" type="button" role="menuitem">Sign out</button>
  </div>
</div>

<script type="module">
import { Amplify } from 'aws-amplify';
import { signIn, signOut, confirmSignIn, getCurrentUser, fetchAuthSession, fetchUserAttributes } from 'aws-amplify/auth';

const $ = id => document.getElementById(id);
const show = id => $(id).classList.remove('auth-hidden');
const hide = id => $(id).classList.add('auth-hidden');
const showError = (id, msg) => { const e = $(id); e.textContent = msg; e.classList.remove('auth-hidden'); };
const hideError = id => $(id).classList.add('auth-hidden');

function showLogin() { hide('boot-spinner'); show('login-wrap'); hide('newpw-wrap'); hide('auth-user-menu'); }
function showNewPw() { hide('boot-spinner'); hide('login-wrap'); show('newpw-wrap'); hide('auth-user-menu'); }
function showApp() { hide('boot-spinner'); hide('login-wrap'); hide('newpw-wrap'); show('auth-user-menu'); populateUserMenu(); if (window.startAutoLedger) window.startAutoLedger(); }

function populateUserMenu() {
  const u = window.AUTH_USER || {};
  const name = u.name || u.email || 'User';
  const initials = name.trim().split(/\s+/).map(s => s[0]).filter(Boolean).slice(0,2).join('').toUpperCase() || 'U';
  $('auth-avatar').textContent = initials;
  $('auth-dd-name').textContent = name;
  $('auth-dd-email').textContent = u.email || '';
  $('auth-dd-role').textContent = u.role || 'user';
}

try {
  $('boot-msg').textContent = 'Loading config…';
  const r = await fetch('amplify_outputs.json', { cache: 'no-store' });
  if (!r.ok) throw new Error('amplify_outputs.json not found');
  Amplify.configure(await r.json());

  $('boot-msg').textContent = 'Checking session…';
  try {
    const user = await getCurrentUser();
    const session = await fetchAuthSession();
    const groups = session.tokens?.idToken?.payload?.['cognito:groups'] || [];
    const role = groups.includes('admin') ? 'admin' : groups.includes('staff') ? 'staff' : null;
    if (!role) {
      await signOut().catch(() => {});
      showLogin();
      showError('login-error', 'Your account exists but no role assigned. Contact admin.');
    } else {
      let attrs = {};
      try { attrs = await fetchUserAttributes(); } catch (_) {}
      window.AUTH_USER = {
        email: user.signInDetails?.loginId || user.username,
        name: attrs.name || attrs.email || user.username,
        role
      };
      showApp();
    }
  } catch (_) {
    showLogin();
  }
} catch (e) {
  showLogin();
  showError('login-error', 'Cannot reach backend: ' + (e.message || e));
}

$('login-btn').addEventListener('click', async () => {
  const email = $('login-email').value.trim().toLowerCase();
  const pwd = $('login-pwd').value;
  if (!email || !pwd) { showError('login-error', 'Enter email and password.'); return; }
  hideError('login-error');
  const btn = $('login-btn');
  btn.disabled = true; btn.textContent = 'Signing in…';
  try {
    const { isSignedIn, nextStep } = await signIn({ username: email, password: pwd });
    if (isSignedIn) { window.location.reload(); return; }
    if (nextStep.signInStep === 'CONFIRM_SIGN_IN_WITH_NEW_PASSWORD_REQUIRED') { showNewPw(); return; }
    showError('login-error', 'Unexpected step: ' + nextStep.signInStep);
  } catch (e) {
    const m = e?.message || String(e);
    let friendly = m;
    if (/NotAuthorizedException|Incorrect username or password/.test(m)) friendly = 'Wrong email or password.';
    else if (/UserNotFoundException/.test(m)) friendly = 'No account with that email.';
    showError('login-error', friendly);
  } finally {
    btn.disabled = false; btn.textContent = 'Sign in →';
  }
});
$('login-pwd').addEventListener('keydown', e => { if (e.key === 'Enter') $('login-btn').click(); });

$('newpw-btn').addEventListener('click', async () => {
  const pwd = $('newpw-pwd').value;
  const pwd2 = $('newpw-pwd2').value;
  if (pwd.length < 8) { showError('newpw-error', 'Password must be 8+ characters.'); return; }
  if (pwd !== pwd2) { showError('newpw-error', 'Passwords do not match.'); return; }
  hideError('newpw-error');
  const btn = $('newpw-btn');
  btn.disabled = true; btn.textContent = 'Saving…';
  try {
    const res = await confirmSignIn({ challengeResponse: pwd });
    if (res.isSignedIn) { window.location.reload(); }
    else { showError('newpw-error', 'Unexpected: ' + res.nextStep?.signInStep); }
  } catch (e) {
    showError('newpw-error', e.message || String(e));
  } finally {
    btn.disabled = false; btn.textContent = 'Save & continue →';
  }
});

// Avatar click toggles the dropdown
$('auth-avatar').addEventListener('click', (e) => {
  e.stopPropagation();
  const dd = $('auth-dropdown');
  const isOpen = dd.classList.toggle('auth-open');
  $('auth-avatar').setAttribute('aria-expanded', isOpen ? 'true' : 'false');
});

// Click outside closes the dropdown
document.addEventListener('click', (e) => {
  const menu = $('auth-user-menu');
  if (!menu.contains(e.target)) {
    $('auth-dropdown').classList.remove('auth-open');
    $('auth-avatar').setAttribute('aria-expanded', 'false');
  }
});

// Esc closes the dropdown
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    $('auth-dropdown').classList.remove('auth-open');
    $('auth-avatar').setAttribute('aria-expanded', 'false');
  }
});

// Sign out
$('auth-signout-btn').addEventListener('click', async () => {
  if (!confirm('Sign out?')) return;
  try { await signOut(); } catch (_) {}
  window.location.reload();
});
</script>
<!-- ====== END AUTH WRAPPER ====== -->

/* ─── TRANSACTION REFERENCE DATABASE ─── */
// Stores past confirmed mappings: { normalizedDesc → { ledger, count, keywords[], lastUsed } }
// Also extracts key phrases for fuzzy matching across similar transactions

function normalizeDesc(desc) {
  return desc.toLowerCase().replace(/[^a-z0-9 ]/g, " ").replace(/\s+/g, " ").trim();
}

function similarityScore(desc1Keywords, desc2Keywords) {
  if (desc1Keywords.length === 0 || desc2Keywords.length === 0) return 0;
  const set1 = new Set(desc1Keywords);
  const set2 = new Set(desc2Keywords);
  let matches = 0;
  set1.forEach(w => { if (set2.has(w)) matches++; });
  const union = new Set([...set1, ...set2]).size;
  return union > 0 ? matches / union : 0;
}

/* ─── KEYWORD INDEX — learns entity→ledger mappings from global data ─── */
// Builds: { "etisalat": { "Telephone Expense": 47, "Utilities": 2 }, "dewa": { "Utilities": 35 } }
function loadRefDB() {
  try {
    const saved = localStorage.getItem("autoledger_refdb");
    return saved ? JSON.parse(saved) : {};
  } catch(e) { return {}; }
}

function saveRefDB(db) {
  try { localStorage.setItem("autoledger_refdb", JSON.stringify(db)); } catch(e) {}
}

function addToRefDB(db, description, ledger) {
  const norm = normalizeDesc(description);
  const keywords = extractKeywords(description);
  if (!norm || !ledger) return db;
  const existing = db[norm];
  if (existing && existing.ledger === ledger) {
    return { ...db, [norm]: { ...existing, count: existing.count + 1, lastUsed: Date.now() } };
  }
  return { ...db, [norm]: { ledger, count: existing ? existing.count + 1 : 1, keywords, lastUsed: Date.now(), originalDesc: description } };
}

function classifyFromRefDB(description, refDB) {
  const norm = normalizeDesc(description);
  const keywords = extractKeywords(description);

  // 1. Exact match on normalized description → 100% confidence
  if (refDB[norm]) {
    return { ledger: refDB[norm].ledger, confidence: 100, source: "exact", matchCount: refDB[norm].count };
  }

  // 2. Partial match — keyword similarity → 50% confidence
  let bestMatch = null, bestScore = 0;
  for (const [key, entry] of Object.entries(refDB)) {
    const score = similarityScore(keywords, entry.keywords || []);
    if (score > bestScore && score >= 0.3) {
      bestScore = score;
      bestMatch = entry;
    }
  }

  if (bestMatch && bestScore >= 0.3) {
    return { ledger: bestMatch.ledger, confidence: 50, source: "partial", matchCount: bestMatch.count };
  }

  return null; // No match → will become 0%
}

// Match a rule's ledger name to the closest actual COA account name
function matchToCOA(ruleLedger, chartOfAccounts) {
  if (!chartOfAccounts || chartOfAccounts.length === 0) return ruleLedger;
  const rl = ruleLedger.toLowerCase();
  // 1. Exact match
  const exact = chartOfAccounts.find(a => a.name.toLowerCase() === rl);
  if (exact) return exact.name;
  // 2. COA name contains the rule name or vice versa
  const contains = chartOfAccounts.find(a => a.name.toLowerCase().includes(rl) || rl.includes(a.name.toLowerCase()));
  if (contains) return contains.name;
  // 3. Word overlap matching — find best score
  const ruleWords = rl.split(/[\s\-&,]+/).filter(w => w.length > 2);
  let best = null, bestScore = 0;
  for (const a of chartOfAccounts) {
    const coaWords = a.name.toLowerCase().split(/[\s\-&,]+/).filter(w => w.length > 2);
    let matches = 0;
    for (const rw of ruleWords) {
      for (const cw of coaWords) {
        if (rw === cw || rw.includes(cw) || cw.includes(rw)) { matches++; break; }
      }
    }
    const score = matches / Math.max(ruleWords.length, 1);
    if (score > bestScore) { bestScore = score; best = a; }
  }
  if (best && bestScore >= 0.5) return best.name;
  return ruleLedger; // fallback to original if no match
}

function classifyTransaction(description, learnedRules, refDB, chartOfAccounts, globalRefDB, globalKeywordIndex) {
  const mapLedger = (name) => matchToCOA(name, chartOfAccounts || []);

  // Priority 1: Client reference database — exact match → 100%
  refDB = refDB || {};
  const refMatch = classifyFromRefDB(description, refDB);
  if (refMatch && refMatch.confidence === 100) return { ...refMatch, ledger: mapLedger(refMatch.ledger) };

  // Priority 2: Client learned keyword rules — exact keyword → 100%
  learnedRules = learnedRules || {};
  const desc = description.toLowerCase().trim();
  const descKey = desc.replace(/[^a-z0-9 ]/g,"").trim();
  if (learnedRules[descKey]) return { ledger: mapLedger(learnedRules[descKey]), confidence: 100, source: "learned" };
  for (const [keyword, ledger] of Object.entries(learnedRules)) { if (desc.includes(keyword)) return { ledger: mapLedger(ledger), confidence: 50, source: "learned-partial" }; }

  // Priority 3: Client reference DB — partial match → 50%
  if (refMatch) return { ...refMatch, ledger: mapLedger(refMatch.ledger) };

  // Priority 4: Global base — exact/partial match
  globalRefDB = globalRefDB || {};
  const globalMatch = classifyFromRefDB(description, globalRefDB);
  if (globalMatch) return { ...globalMatch, ledger: mapLedger(globalMatch.ledger), source: globalMatch.source + "-global" };

  // Priority 5: Keyword intelligence — partial match → 50%
  globalKeywordIndex = globalKeywordIndex || {};
  const kwMatch = classifyFromKeywords(description, globalKeywordIndex);
  if (kwMatch) return { ...kwMatch, ledger: mapLedger(kwMatch.ledger), confidence: 50, source: "keyword" };

  // Priority 6: Built-in classification rules → 50% (pattern match, not exact)
  let bestBuiltin = null;
  for (const rule of CLASSIFICATION_RULES) { for (const p of rule.patterns) { if (desc.includes(p) && rule.confidence > (bestBuiltin?bestBuiltin.confidence:0)) bestBuiltin = rule; } }
  if (bestBuiltin) {
    return { ledger: matchToCOA(bestBuiltin.ledger, chartOfAccounts || []), confidence: 50, source: "rule" };
  }

  // No match at all → 0%
  return { ledger: "Review Required", confidence: 0, source: "new" };
}

function parseXLSXFile(arrayBuffer) {
  const wb = XLSX.read(arrayBuffer, { type: "array", cellDates: true });

}

function parseCSVLine(line) { const r=[]; let c="",q=false; for(let i=0;i<line.length;i++){if(line[i]==='"')q=!q;else if(line[i]===","&&!q){r.push(c.trim());c="";}else c+=line[i];} r.push(c.trim()); return r; }

function parseDate(val) {
  if(!val)return"";
  const str=String(val).trim();
  const mo={jan:"01",feb:"02",mar:"03",apr:"04",may:"05",jun:"06",jul:"07",aug:"08",sep:"09",oct:"10",nov:"11",dec:"12"};
  let dd,mm,yyyy;

  // DD-MMM-YYYY or DD/MMM/YYYY (e.g., "12-FEB-2026", "12/Feb/2026")
  const mAlpha=str.match(/^(\d{1,2})[\/\-\s]([A-Za-z]{3})[\/\-\s](\d{2,4})$/);
  if(mAlpha){
    dd=mAlpha[1]; mm=mo[mAlpha[2].toLowerCase()]||"01"; yyyy=mAlpha[3];
    if(yyyy.length===2) yyyy=(parseInt(yyyy)>50?"19":"20")+yyyy;
    return dd.padStart(2,"0")+"-"+mm+"-"+yyyy;
  }

  // YYYY-MM-DD or YYYY/MM/DD (ISO format)
  const mISO=str.match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})$/);
  if(mISO){
    return mISO[3].padStart(2,"0")+"-"+mISO[2].padStart(2,"0")+"-"+mISO[1];
  }

  // DD/MM/YYYY, DD-MM-YYYY, MM/DD/YYYY, MM-DD-YYYY (numeric)
  const mNum=str.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})$/);
  if(mNum){
    let p1=parseInt(mNum[1]), p2=parseInt(mNum[2]);
    yyyy=mNum[3]; if(yyyy.length===2) yyyy=(parseInt(yyyy)>50?"19":"20")+yyyy;
    // Determine DD vs MM: if first part > 12, it must be DD; if second > 12, first is MM
    if(p1>12){ dd=mNum[1]; mm=mNum[2]; } // DD/MM/YYYY (day > 12)
    else if(p2>12){ dd=mNum[2]; mm=mNum[1]; } // MM/DD/YYYY (day > 12)
    else { dd=mNum[1]; mm=mNum[2]; } // Ambiguous — assume DD/MM (standard in UAE)
    return dd.padStart(2,"0")+"-"+mm.padStart(2,"0")+"-"+yyyy;
  }

  // "DD Mon YYYY" (e.g., "12 Feb 2026")
  const mSpace=str.match(/^(\d{1,2})\s+([A-Za-z]{3,})\s+(\d{4})$/);
  if(mSpace){
    dd=mSpace[1]; mm=mo[mSpace[2].substring(0,3).toLowerCase()]||"01"; yyyy=mSpace[3];
    return dd.padStart(2,"0")+"-"+mm+"-"+yyyy;
  }

  // Fallback: try to extract any date-like pattern and normalize
  const mAny=str.match(/(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/);
  if(mAny){
    let p1=parseInt(mAny[1]), p2=parseInt(mAny[2]);
    yyyy=mAny[3]; if(yyyy.length===2) yyyy=(parseInt(yyyy)>50?"19":"20")+yyyy;
    if(p1>12){ dd=mAny[1]; mm=mAny[2]; }
    else if(p2>12){ dd=mAny[2]; mm=mAny[1]; }
    else { dd=mAny[1]; mm=mAny[2]; }
    return dd.padStart(2,"0")+"-"+mm.padStart(2,"0")+"-"+yyyy;
  }

  return str;
}

function parseNumber(val) { if(val==null||val==="")return 0; return parseFloat(String(val).replace(/[,\s]/g,"").replace(/[^0-9.\-]/g,""))||0; }

function parseBankStatementCSV(text) {
  const lines=text.split("\n").filter(l=>l.trim()); if(lines.length<2)return[];
  const headers=parseCSVLine(lines[0]).map(h=>h.toLowerCase().replace(/[^a-z0-9]/g,""));
  const colMap={};
  headers.forEach((h,i)=>{if(h.includes("date"))colMap.date=i;if(h.includes("desc")||h.includes("particular")||h.includes("narration")||h.includes("detail")||h.includes("reference"))colMap.description=i;if(h.includes("debit")||h.includes("withdrawal")||h.includes("withdraw"))colMap.debit=i;if(h.includes("credit")||h.includes("deposit"))colMap.credit=i;if(h.includes("balance"))colMap.balance=i;if(h.includes("amount")&&colMap.debit===undefined)colMap.amount=i;});
  if(colMap.date===undefined&&colMap.description===undefined)return[];
  const txns=[],seen=new Set();
  for(let i=1;i<lines.length;i++){const cols=parseCSVLine(lines[i]);if(cols.length<2)continue;const date=parseDate(cols[colMap.date]||"");const desc=(cols[colMap.description]||"").replace(/\s+/g," ").trim();if(!date&&!desc)continue;let d=0,c=0;if(colMap.amount!==undefined&&colMap.debit===undefined){const a=parseNumber(cols[colMap.amount]);if(a<0)d=Math.abs(a);else c=a;}else{d=parseNumber(cols[colMap.debit]);c=parseNumber(cols[colMap.credit]);}const b=parseNumber(cols[colMap.balance]);const k=date+"|"+desc+"|"+d+"|"+c;if(seen.has(k))continue;seen.add(k);txns.push({id:crypto.randomUUID(),date,description:desc,debit:d,credit:c,balance:b});}
  return txns;
}

// Stop words — common words that don't help identify a ledger
const STOP_WORDS = new Set(["the","a","an","and","or","of","to","for","in","on","at","by","from","with","is","was","are","were","be","been","has","had","have","do","does","did","will","would","can","could","shall","should","may","might","this","that","these","those","it","its","he","she","they","we","you","i","me","my","our","your","his","her","their","mr","mrs","ms","dr","sr","jr","no","not","but","so","if","as","up","out","all","any","each","few","more","most","other","some","such","than","too","very","just","also","now","new","old","own","only","same","back","how","when","where","what","which","who","whom","why","llc","fze","ltd","pvt","inc","co","corp","uae","aed","usd","eur","gbp","inr","ref","srn","iban","bic","swift","acct","acc","transfer","fund","payment","transaction","trn","txn","ipt","ipp","via","per","etc","num","number","pmt","amt","amount","total","balance","opening","closing","date","month","year","jan","feb","mar","apr","may","jun","jul","aug","sep","oct","nov","dec","january","february","march","april","june","july","august","september","october","november","december","2020","2021","2022","2023","2024","2025","2026","001","002","003","004","005"]);

// Extract meaningful keywords from a description
function extractKeywords(desc) {
  if (!desc) return [];
  return desc.toLowerCase()
    .replace(/[^a-z0-9 ]/g, " ")
    .replace(/\s+/g, " ").trim()
    .split(" ")
    .filter(w => w.length >= 3 && !STOP_WORDS.has(w) && !/^\d+$/.test(w));
}

// Build keyword index from refDB: { keyword: { ledger: count, ledger2: count2 } }
function buildKeywordIndex(refDB) {
  const index = {}; // keyword → { ledgerName: totalCount }
  for (const [descKey, entry] of Object.entries(refDB)) {
    const keywords = extractKeywords(descKey);
    const ledger = entry.ledger;
    const count = entry.count || 1;
    for (const kw of keywords) {
      if (!index[kw]) index[kw] = {};
      index[kw][ledger] = (index[kw][ledger] || 0) + count;
    }
  }
  return index;
}

// Classify using keyword index — finds the best ledger by keyword vote
function classifyFromKeywords(description, keywordIndex) {
  if (!description || !keywordIndex || Object.keys(keywordIndex).length === 0) return null;
  const keywords = extractKeywords(description);
  if (keywords.length === 0) return null;

  // Each keyword votes for its ledger(s), weighted by frequency
  const votes = {}; // ledger → { totalVotes, matchedKeywords }
  let matchedCount = 0;
  for (const kw of keywords) {
    if (keywordIndex[kw]) {
      matchedCount++;
      for (const [ledger, count] of Object.entries(keywordIndex[kw])) {
        if (!votes[ledger]) votes[ledger] = { total: 0, keywords: [] };
        votes[ledger].total += count;
        if (!votes[ledger].keywords.includes(kw)) votes[ledger].keywords.push(kw);
      }
    }
  }

  if (matchedCount === 0) return null;

  // Find the ledger with the highest vote
  let bestLedger = null, bestVotes = 0, bestKeywords = [];
  for (const [ledger, data] of Object.entries(votes)) {
    // Score = total frequency votes × number of distinct keywords matched
    const score = data.total * data.keywords.length;
    if (score > bestVotes) {
      bestVotes = score;
      bestLedger = ledger;
      bestKeywords = data.keywords;
    }
  }

  if (!bestLedger) return null;

  // Confidence: based on how many of the input keywords matched
  const matchRatio = matchedCount / keywords.length;
  const confidence = Math.min(92, Math.round(55 + matchRatio * 35 + Math.min(bestKeywords.length, 3) * 5));

  return { ledger: bestLedger, confidence, source: "keyword", matchCount: bestVotes, matchedKeywords: bestKeywords };
}

  const handleBillUpload=useCallback(async(e)=>{

    const newBills=files.map(f=>({
      id:crypto.randomUUID(),file:f,fileName:f.name,status:"pending",

  const processBill=useCallback(async(billId)=>{
    setBills(prev=>prev.map(b=>b.id===billId?{...b,status:"processing"}:b));
    setBillProcessing(true);setBillProgress("Reading document...");
    try{
      const bill=bills.find(b=>b.id===billId);
      if(!bill||!bill.file)throw new Error("Bill file not found");
      // Step 1: Read file content
      let text="";
      const nm=bill.fileName.toLowerCase();
      if(nm.endsWith(".pdf")){
        // Try PDF.js text extraction
        setBillProgress("Extracting text from PDF...");
        const buf=await bill.file.arrayBuffer();
        const pdf=await pdfjsLib.getDocument({data:buf}).promise;
        for(let p=1;p<=pdf.numPages;p++){
          const page=await pdf.getPage(p);
          const tc=await page.getTextContent();
          text+=tc.items.map(i=>i.str).join(" ")+"\n";
        }
        // If not enough text, fall back to OCR
        if(text.replace(/\s/g,"").length<50){
          setBillProgress("Running OCR...");
          for(let p=1;p<=pdf.numPages;p++){
            const page=await pdf.getPage(p);
            const vp=page.getViewport({scale:2.5});
            const canvas=document.createElement("canvas");
            canvas.width=vp.width;canvas.height=vp.height;
            await page.render({canvasContext:canvas.getContext("2d"),viewport:vp}).promise;
            setBillProgress("OCR page "+p+" of "+pdf.numPages+"...");
            const{data:{text:t}}=await Tesseract.recognize(canvas,"eng");
            text+=t+"\n";
          }
        }
      } else {
        // Image file — OCR directly
        setBillProgress("Running OCR on image...");
        const{data:{text:t}}=await Tesseract.recognize(bill.file,"eng");
        text=t;
      }
      if(!text||text.trim().length<20)throw new Error("Could not extract text from document");

      // Step 2: AI extraction via Anthropic API
      setBillProgress("AI extracting invoice fields...");
      const resp=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514",max_tokens:800,
          messages:[{role:"user",content:"Extract invoice data from this text. Return ONLY valid JSON (no markdown, no backticks):\n{\"invoice_number\":\"\",\"vendor_name\":\"\",\"date\":\"DD-MM-YYYY\",\"description\":\"\",\"subtotal\":0,\"vat\":0,\"total_amount\":0,\"currency\":\"AED\"}\n\nDocument text:\n"+text.substring(0,5000)}]
        })
      });
      const data=await resp.json();
      const aiText=(data.content||[]).map(b=>b.text||"").join("");
      const clean=aiText.replace(/```json|```/g,"").trim();
      const extracted=JSON.parse(clean);

      setBills(prev=>prev.map(b=>b.id===billId?{...b,
        status:"extracted",ocrText:text,
        invoiceNumber:extracted.invoice_number||"",
        vendorName:extracted.vendor_name||"",
        date:extracted.date||"",
        description:extracted.description||"",
        subtotal:extracted.subtotal||0,
        vat:extracted.vat||0,
        totalAmount:extracted.total_amount||0
      }:b));
    }catch(err){
      setBills(prev=>prev.map(b=>b.id===billId?{...b,status:"error",description:err.message}:b));

    setBillProcessing(false);setBillProgress("");
  },[bills]);

              const totalDebit=transactions.reduce((s,t)=>s+t.debit,0);
              const totalCredit=transactions.reduce((s,t)=>s+t.credit,0);
              const userOB=parseFloat(userOpeningBal);

          {/* Auto-calculated summary */}
          {(()=>{
            const totalDebit=transactions.reduce((s,t)=>s+t.debit,0);

            const net=totalCredit-totalDebit;
            const firstTxn=transactions[0];
            const lastTxn=transactions[transactions.length-1];
            const closingBal=lastTxn&&lastTxn.balance?lastTxn.balance:0;
            let openingBal=0;

              openingBal=firstTxn.balance - firstTxn.credit + firstTxn.debit;

              openingBal=closingBal-net;

            // Verification against user-entered balances
            const userOB=userOpeningBal!==""?parseFloat(userOpeningBal):null;
            const userCB=userClosingBal!==""?parseFloat(userClosingBal):null;
            const obMatch=userOB!==null?Math.abs(userOB-openingBal)<0.01:null;
            const cbMatch=userCB!==null?Math.abs(userCB-closingBal)<0.01:null;
            // Cross-check: user opening + credits - debits should = user closing
            const crossCheck=(userOB!==null&&userCB!==null)?Math.abs((userOB+totalCredit-totalDebit)-userCB)<0.01:null;

            return <div style={{display:"flex",flexDirection:"column",gap:12}}>
              {/* Auto-calculated row */}

                <span style={{fontSize:12,color:"#6b65a0"}}>Opening: <strong style={{color:"#06b6d4",fontFamily:"'IBM Plex Mono',monospace"}}>{fmt(openingBal)}</strong></span>
                <span style={{fontSize:12,color:"#6b65a0"}}>Total Dr: <strong style={{color:"#f87171",fontFamily:"'IBM Plex Mono',monospace"}}>{fmt(totalDebit)}</strong></span>
                <span style={{fontSize:12,color:"#6b65a0"}}>Total Cr: <strong style={{color:"#4ade80",fontFamily:"'IBM Plex Mono',monospace"}}>{fmt(totalCredit)}</strong></span>
                <span style={{fontSize:12,color:"#6b65a0"}}>Closing: <strong style={{color:"#06b6d4",fontFamily:"'IBM Plex Mono',monospace"}}>{fmt(closingBal)}</strong></span>
              </div>

              {/* User verification row */}
              <div style={{display:"flex",gap:12,padding:"14px 16px",background:"rgba(6,182,212,0.03)",borderRadius:8,border:"1px solid rgba(6,182,212,0.15)",flexWrap:"wrap",alignItems:"center"}}>
                <span style={{fontSize:11,color:"#06b6d4",fontWeight:600,whiteSpace:"nowrap"}}>🔍 Verify (as per books):</span>
                <div style={{display:"flex",alignItems:"center",gap:4}}>
                  <span style={{fontSize:11,color:"#6b65a0",whiteSpace:"nowrap"}}>Opening Bal:</span>
                  <input type="number" value={userOpeningBal} onChange={e=>setUserOpeningBal(e.target.value)} placeholder={fmt(openingBal)} style={{width:120,background:"#12111e",border:"1px solid "+(obMatch===true?"rgba(74,222,128,0.5)":obMatch===false?"rgba(248,113,113,0.5)":"#2a2450"),borderRadius:6,padding:"6px 10px",color:"#e0e6f0",fontSize:12,outline:"none",fontFamily:"'IBM Plex Mono',monospace"}} />
                  {obMatch===true&&<span style={{color:"#4ade80",fontSize:12}}>✓</span>}
                  {obMatch===false&&<span style={{color:"#f87171",fontSize:10}}>Diff: {fmt(Math.abs(userOB-openingBal))}</span>}
                </div>
                <div style={{display:"flex",alignItems:"center",gap:4}}>
                  <span style={{fontSize:11,color:"#6b65a0",whiteSpace:"nowrap"}}>Closing Bal:</span>
                  <input type="number" value={userClosingBal} onChange={e=>setUserClosingBal(e.target.value)} placeholder={fmt(closingBal)} style={{width:120,background:"#12111e",border:"1px solid "+(cbMatch===true?"rgba(74,222,128,0.5)":cbMatch===false?"rgba(248,113,113,0.5)":"#2a2450"),borderRadius:6,padding:"6px 10px",color:"#e0e6f0",fontSize:12,outline:"none",fontFamily:"'IBM Plex Mono',monospace"}} />
                  {cbMatch===true&&<span style={{color:"#4ade80",fontSize:12}}>✓</span>}
                  {cbMatch===false&&<span style={{color:"#f87171",fontSize:10}}>Diff: {fmt(Math.abs(userCB-closingBal))}</span>}
                </div>
                {crossCheck!==null&&<div style={{borderLeft:"1px solid rgba(6,182,212,0.2)",paddingLeft:12,display:"flex",alignItems:"center",gap:4}}>
                  {crossCheck?
                    <span style={{fontSize:11,color:"#4ade80",fontWeight:600}}>✅ Balances tally</span>:
                    <span style={{fontSize:11,color:"#f87171",fontWeight:600}}>⚠ Mismatch: Opening ({fmt(userOB)}) + Cr ({fmt(totalCredit)}) - Dr ({fmt(totalDebit)}) = {fmt(userOB+totalCredit-totalDebit)} ≠ Closing ({fmt(userCB)})</span>
                  }
                </div>}
              </div>
            </div>;
          })()}
          <div style={{borderRadius:10,border:"1px solid #2a2450",overflow:"hidden"}}><div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}><thead><tr style={{background:"#0e0d1a"}}>
              {["#","Date","Description","Debit (AED)","Credit (AED)","Balance"].map(h=><th key={h} style={{padding:"10px 14px",textAlign:h.includes("Debit")||h.includes("Credit")||h.includes("Balance")?"right":"left",color:"#6b65a0",fontWeight:600,borderBottom:"1px solid #2a2450",whiteSpace:"nowrap"}}>{h}</th>)}
            </tr></thead><tbody>{transactions.map((t,i)=><tr key={t.id} style={{borderBottom:"1px solid #12111e",background:i%2===0?"transparent":"rgba(13,21,37,0.4)"}}>
              <td style={{padding:"9px 14px",color:"#4a4570"}}>{i+1}</td>
              <td style={{padding:"9px 14px",fontFamily:"'IBM Plex Mono',monospace",fontSize:11,whiteSpace:"nowrap"}}>{t.date}</td>
              <td style={{padding:"9px 14px",maxWidth:350}}>{t.description}</td>
              <td style={{padding:"9px 14px",textAlign:"right",color:t.debit?"#f87171":"#3a3560",fontFamily:"'IBM Plex Mono',monospace",fontSize:11}}>{t.debit?fmt(t.debit):"—"}</td>
              <td style={{padding:"9px 14px",textAlign:"right",color:t.credit?"#4ade80":"#3a3560",fontFamily:"'IBM Plex Mono',monospace",fontSize:11}}>{t.credit?fmt(t.credit):"—"}</td>
              <td style={{padding:"9px 14px",textAlign:"right",fontFamily:"'IBM Plex Mono',monospace",fontSize:11,color:"#9b93c8"}}>{t.balance?fmt(t.balance):"—"}</td>
            </tr>)}</tbody></table>
          </div></div>
          <div style={{display:"flex",justifyContent:"flex-end",gap:20,padding:"10px 16px",background:"#0e0d1a",borderRadius:8,border:"1px solid #2a2450",flexWrap:"wrap"}}>
            <span style={{fontSize:12,color:"#6b65a0"}}>Opening: <strong style={{color:"#06b6d4",fontFamily:"'IBM Plex Mono',monospace"}}>{fmt(transactions[0]&&transactions[0].balance?transactions[0].balance-transactions[0].credit+transactions[0].debit:(transactions[transactions.length-1]?transactions[transactions.length-1].balance-(transactions.reduce((s,t)=>s+t.credit,0)-transactions.reduce((s,t)=>s+t.debit,0)):0))}</strong></span>
            <span style={{fontSize:12,color:"#6b65a0"}}>Total Debit: <strong style={{color:"#f87171",fontFamily:"'IBM Plex Mono',monospace"}}>{fmt(transactions.reduce((s,t)=>s+t.debit,0))}</strong></span>
            <span style={{fontSize:12,color:"#6b65a0"}}>Total Credit: <strong style={{color:"#4ade80",fontFamily:"'IBM Plex Mono',monospace"}}>{fmt(transactions.reduce((s,t)=>s+t.credit,0))}</strong></span>
            <span style={{fontSize:12,color:"#6b65a0"}}>Closing: <strong style={{color:"#06b6d4",fontFamily:"'IBM Plex Mono',monospace"}}>{fmt(transactions[transactions.length-1]?transactions[transactions.length-1].balance:0)}</strong></span>
          </div>
        </div>)}


        {aiClassifying&&<div style={{position:"fixed",inset:0,background:"rgba(10,15,26,0.85)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:999}}>
          <div style={{background:"#161230",borderRadius:16,padding:40,textAlign:"center",border:"1px solid #2a2450",maxWidth:400}}>
            <div style={{fontSize:48,marginBottom:16,animation:"pulse 1.5s infinite"}}>🤖</div>
            <div style={{fontSize:18,fontWeight:600,marginBottom:8}}>Classifying Transactions</div>
            <div style={{fontSize:13,color:"#6b65a0",marginBottom:16}}>Matching {transactions.length} transactions to Chart of Accounts...</div>
            <div style={{width:"100%",height:4,background:"#2a2450",borderRadius:2,overflow:"hidden"}}><div style={{width:"70%",height:"100%",background:"linear-gradient(90deg,#6B5BA7,#9B8EC4)",borderRadius:2,animation:"loading 2s ease-in-out infinite"}}/></div>
          </div>
        </div>}

        {appMode==="bank"&&step===4&&(<div style={{display:"flex",flexDirection:"column",gap:20}}>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:12}}>
            {[{label:"Expenses",val:expenseCount,color:"#f87171",bg:"rgba(248,113,113,0.1)"},{label:"Revenue",val:revenueCount,color:"#4ade80",bg:"rgba(74,222,128,0.1)"},{label:"Auto-Assigned",val:stats.auto,color:"#a78bfa",bg:"rgba(107,91,167,0.1)"},{label:"Suspense",val:stats.suspense,color:"#fbbf24",bg:"rgba(251,191,36,0.1)"},{label:"Confirmed",val:stats.confirmed,color:"#a78bfa",bg:"rgba(167,139,250,0.1)"}].map(s=><div key={s.label} style={{background:s.bg,borderRadius:10,padding:"14px 16px",border:"1px solid "+s.color+"22"}}><div style={{fontSize:22,fontWeight:700,color:s.color,fontFamily:"'IBM Plex Mono',monospace"}}>{s.val}</div><div style={{fontSize:11,color:"#6b65a0",marginTop:2}}>{s.label}</div></div>)}
          </div>

          {/* Expenses / Revenue Tabs */}
          <div style={{display:"flex",gap:0,borderBottom:"1px solid #2a2450"}}>
            <button onClick={()=>{setReviewTab("expenses");setFilterStatus("all");}} style={{padding:"10px 24px",fontSize:13,fontWeight:600,cursor:"pointer",border:"none",borderBottom:reviewTab==="expenses"?"2px solid #f87171":"2px solid transparent",background:"transparent",color:reviewTab==="expenses"?"#f87171":"#4a4570"}}>💸 Debit ({expenseCount})</button>
            <button onClick={()=>{setReviewTab("revenue");setFilterStatus("all");}} style={{padding:"10px 24px",fontSize:13,fontWeight:600,cursor:"pointer",border:"none",borderBottom:reviewTab==="revenue"?"2px solid #4ade80":"2px solid transparent",background:"transparent",color:reviewTab==="revenue"?"#4ade80":"#4a4570"}}>💰 Credit ({revenueCount})</button>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:12,flexWrap:"wrap"}}>
            <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
              <input type="text" placeholder="Search..." value={searchTerm} onChange={e=>setSearchTerm(e.target.value)} style={{background:"#0e0d1a",border:"1px solid #2a2450",borderRadius:6,padding:"7px 12px",color:"#e0e6f0",fontSize:12,width:180}}/>
              {/* Description filter dropdown */}
              <select value={descGroup} onChange={e=>setDescGroup(e.target.value)} style={{background:"#0e0d1a",border:"1px solid "+(descGroup?"rgba(6,182,212,0.4)":"#2a2450"),borderRadius:6,padding:"7px 8px",color:descGroup?"#06b6d4":"#6b65a0",fontSize:11,cursor:"pointer",maxWidth:220}}>
                <option value="">Filter by Description</option>
                {uniqueDescriptions.map(d=><option key={d} value={d}>{d.length>40?d.substring(0,40)+"…":d}</option>)}
              </select>
              {["all","suspense","confirmed"].map(f=><button key={f} onClick={()=>setFilterStatus(f)} style={{background:filterStatus===f?"rgba(107,91,167,0.15)":"#0e0d1a",border:filterStatus===f?"1px solid rgba(107,91,167,0.4)":"1px solid #2a2450",color:filterStatus===f?"#a78bfa":"#6b65a0",borderRadius:6,padding:"6px 14px",fontSize:11,fontWeight:500,cursor:"pointer"}}>{f==="all"?"All":f==="suspense"?"⚠ Suspense ("+stats.suspense+")":"✓ Confirmed"}</button>)}
              <div style={{display:"flex",alignItems:"center",gap:6,borderLeft:"1px solid #2a2450",paddingLeft:12}}>
                <span style={{fontSize:10,color:"#6b65a0",whiteSpace:"nowrap"}}>Confidence:</span>
                <select value={confidenceFilter} onChange={e=>setConfidenceFilter(Number(e.target.value))} style={{background:"#0e0d1a",border:"1px solid #2a2450",borderRadius:4,padding:"4px 6px",color:confidenceFilter>0?"#fbbf24":"#6b65a0",fontSize:10,cursor:"pointer"}}>
                  <option value={0}>All</option>
                  <option value={1}>0% — New (unmatched)</option>
                  <option value={50}>≤ 50% — Partial match</option>
                </select>
              </div>
              {descGroup&&<div style={{display:"flex",alignItems:"center",gap:4,borderLeft:"1px solid #2a2450",paddingLeft:12}}>
                <span style={{fontSize:10,color:"#06b6d4",fontWeight:600}}>Group: "{descGroup}"</span>
                <button onClick={()=>setDescGroup("")} style={{background:"none",border:"none",color:"#f87171",fontSize:12,cursor:"pointer",padding:"0 4px"}}>✕</button>
              </div>}
            </div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              <div style={{position:"relative",display:"inline-block"}} ref={el=>dropdownRefs.current["_bank"]=el}>
                <div style={{fontSize:10,color:"#6b65a0",marginBottom:2}}>Bank Ledger (for journal entries)</div>
                <div onClick={()=>setCoaDropdownOpen(p=>({...p,_bank:!p._bank}))} style={{background:"#0e0d1a",border:"1px solid #2a2450",borderRadius:6,padding:"6px 10px",color:bankAccount?"#e0e6f0":"#4a4570",fontSize:11,cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",minWidth:220,gap:6}}>
                  <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{bankAccount||"Select bank ledger..."}</span><span style={{color:"#4a4570"}}>▾</span>
                </div>
                {coaDropdownOpen._bank&&<div style={{position:"absolute",top:"100%",left:0,right:0,zIndex:100,background:"#0e0d1a",border:"1px solid #2a2450",borderRadius:8,boxShadow:"0 8px 32px rgba(0,0,0,0.5)",maxHeight:280,overflow:"hidden",display:"flex",flexDirection:"column",minWidth:280}}>
                  <input type="text" placeholder="Type bank name or search..." value={coaSearch._bank||""} onChange={e=>{setCoaSearch(p=>({...p,_bank:e.target.value}));setBankAccount(e.target.value);}} onClick={e=>e.stopPropagation()} autoFocus style={{background:"#12131f",border:"none",borderBottom:"1px solid #2a2450",padding:"8px 10px",color:"#e0e6f0",fontSize:11,outline:"none"}}/>
                  <div style={{overflowY:"auto",maxHeight:230}}>
                    {chartOfAccounts.filter(a=>{const t=(a.type||"").toLowerCase();const isBank=t==="bank"||t==="cash";const matchesSearch=!coaSearch._bank||a.name.toLowerCase().includes((coaSearch._bank||"").toLowerCase());return isBank&&matchesSearch;}).map(a=><div key={a.name} onClick={()=>{setBankAccount(a.name);setCoaSearch(p=>({...p,_bank:""}));setCoaDropdownOpen(p=>({...p,_bank:false}));}} style={{padding:"7px 10px",fontSize:11,cursor:"pointer",background:a.name===bankAccount?"rgba(107,91,167,0.1)":"transparent",color:a.name===bankAccount?"#a78bfa":"#c0c8dc",borderBottom:"1px solid #12111e"}} onMouseEnter={e=>e.currentTarget.style.background="rgba(107,91,167,0.08)"} onMouseLeave={e=>e.currentTarget.style.background=a.name===bankAccount?"rgba(107,91,167,0.1)":"transparent"}>{a.name}</div>)}
                  </div>
                </div>}
              </div>
              <button onClick={confirmSelected} disabled={selectedIds.size===0} style={{background:"#0e0d1a",border:"1px solid #2a2450",borderRadius:6,padding:"6px 14px",color:selectedIds.size>0?"#4ade80":"#3a3560",fontSize:11,fontWeight:600,cursor:selectedIds.size>0?"pointer":"default"}}>✓ Confirm{selectedIds.size>0?" ("+selectedIds.size+")":""}</button>
              <button onClick={unconfirmSelected} disabled={selectedIds.size===0} style={{background:"#0e0d1a",border:"1px solid #2a2450",borderRadius:6,padding:"6px 14px",color:selectedIds.size>0?"#fbbf24":"#3a3560",fontSize:11,fontWeight:600,cursor:selectedIds.size>0?"pointer":"default"}}>✗ Unconfirm{selectedIds.size>0?" ("+selectedIds.size+")":""}</button>
              <button onClick={confirmAll} style={{background:"#0e0d1a",border:"1px solid #2a2450",borderRadius:6,padding:"6px 10px",color:"#6b65a0",fontSize:10,cursor:"pointer"}}>✓ All</button>
              <button onClick={unconfirmAll} style={{background:"#0e0d1a",border:"1px solid #2a2450",borderRadius:6,padding:"6px 10px",color:"#6b65a0",fontSize:10,cursor:"pointer"}}>✗ All</button>
              <button onClick={()=>setShowAddLedger(!showAddLedger)} style={{background:showAddLedger?"rgba(6,182,212,0.15)":"#0e0d1a",border:"1px solid "+(showAddLedger?"rgba(6,182,212,0.4)":"#2a2450"),borderRadius:6,padding:"6px 12px",color:"#06b6d4",fontSize:10,fontWeight:600,cursor:"pointer"}}>+ New Ledger</button>
              <button onClick={generateExport} style={{background:"linear-gradient(135deg,#6B5BA7,#4B3D8F)",color:"#fff",border:"none",borderRadius:6,padding:"6px 18px",fontSize:12,fontWeight:600,cursor:"pointer"}}>Generate Export →</button>
            </div>
          </div>

          {/* Add New Ledger Form */}
          {showAddLedger&&<div style={{background:"#0e0d1a",border:"1px solid rgba(6,182,212,0.3)",borderRadius:10,padding:16,display:"flex",gap:10,alignItems:"flex-end",flexWrap:"wrap"}}>
            <div style={{flex:"1 1 200px"}}>
              <div style={{fontSize:10,color:"#6b65a0",marginBottom:4}}>Account Name</div>
              <input type="text" value={newLedgerName} onChange={e=>setNewLedgerName(e.target.value)} placeholder="e.g. Commission Expense" autoFocus style={{width:"100%",background:"#12111e",border:"1px solid #2a2450",borderRadius:6,padding:"8px 12px",color:"#e0e6f0",fontSize:12,outline:"none"}} onKeyDown={e=>{if(e.key==="Enter"&&newLedgerName.trim())addNewLedger(newLedgerName,newLedgerType,newLedgerCode);}} />
            </div>
            <div style={{flex:"0 0 180px"}}>
              <div style={{fontSize:10,color:"#6b65a0",marginBottom:4}}>Account Type</div>
              <select value={newLedgerType} onChange={e=>setNewLedgerType(e.target.value)} style={{width:"100%",background:"#12111e",border:"1px solid #2a2450",borderRadius:6,padding:"8px 10px",color:"#e0e6f0",fontSize:12,cursor:"pointer"}}>
                <optgroup label="Expense">
                  <option value="Expense">Expense</option>
                  <option value="Cost of Goods Sold">Cost of Goods Sold</option>
                </optgroup>
                <optgroup label="Income">
                  <option value="Revenue">Revenue</option>
                  <option value="Other Income">Other Income</option>
                </optgroup>
                <optgroup label="Asset">
                  <option value="Asset">Other Asset</option>
                  <option value="Other Current Asset">Other Current Asset</option>
                  <option value="Fixed Asset">Fixed Asset</option>
                  <option value="Bank">Bank</option>
                  <option value="Cash">Cash</option>
                </optgroup>
                <optgroup label="Liability">
                  <option value="Liability">Other Liability</option>
                  <option value="Other Current Liability">Other Current Liability</option>
                  <option value="Long Term Liability">Long Term Liability</option>
                  <option value="Accounts Payable">Accounts Payable</option>
                </optgroup>
                <optgroup label="Equity">
                  <option value="Equity">Equity</option>
                </optgroup>
              </select>
            </div>
            <div style={{flex:"0 0 100px"}}>
              <div style={{fontSize:10,color:"#6b65a0",marginBottom:4}}>Code (optional)</div>
              <input type="text" value={newLedgerCode} onChange={e=>setNewLedgerCode(e.target.value)} placeholder="e.g. 5015" style={{width:"100%",background:"#12111e",border:"1px solid #2a2450",borderRadius:6,padding:"8px 10px",color:"#e0e6f0",fontSize:12,outline:"none",fontFamily:"'IBM Plex Mono',monospace"}} />
            </div>
            <button onClick={()=>addNewLedger(newLedgerName,newLedgerType,newLedgerCode)} disabled={!newLedgerName.trim()} style={{background:"linear-gradient(135deg,#06b6d4,#0891b2)",color:"#fff",border:"none",borderRadius:6,padding:"8px 18px",fontSize:12,fontWeight:600,cursor:newLedgerName.trim()?"pointer":"default",opacity:newLedgerName.trim()?1:0.4,whiteSpace:"nowrap"}}>Add to COA</button>
            <button onClick={()=>{setShowAddLedger(false);setNewLedgerName("");setNewLedgerType("Expense");setNewLedgerCode("");}} style={{background:"#12111e",border:"1px solid #2a2450",borderRadius:6,padding:"8px 12px",color:"#6b65a0",fontSize:11,cursor:"pointer"}}>Cancel</button>
          </div>}

          {/* Add New Vendor Form */}
          {showAddVendor&&<div style={{background:"#0e0d1a",border:"1px solid rgba(74,222,128,0.3)",borderRadius:10,padding:16,display:"flex",gap:10,alignItems:"flex-end",flexWrap:"wrap"}}>
            <div style={{flex:"1 1 250px"}}>
              <div style={{fontSize:10,color:"#4ade80",marginBottom:4,fontWeight:600}}>➕ Add New Vendor</div>
              <input type="text" value={newVendorName} onChange={e=>setNewVendorName(e.target.value)} placeholder="e.g. Etisalat, DEWA, Amazon" autoFocus style={{width:"100%",background:"#12111e",border:"1px solid #2a2450",borderRadius:6,padding:"8px 12px",color:"#e0e6f0",fontSize:12,outline:"none"}} onKeyDown={e=>{if(e.key==="Enter"&&newVendorName.trim())addNewVendor(newVendorName);}} />
            </div>
            <button onClick={()=>addNewVendor(newVendorName)} disabled={!newVendorName.trim()} style={{background:"linear-gradient(135deg,#4ade80,#22c55e)",color:"#0a0b14",border:"none",borderRadius:6,padding:"8px 18px",fontSize:12,fontWeight:700,cursor:newVendorName.trim()?"pointer":"default",opacity:newVendorName.trim()?1:0.4}}>Add Vendor</button>
            <button onClick={()=>{setShowAddVendor(false);setNewVendorName("");}} style={{background:"#12111e",border:"1px solid #2a2450",borderRadius:6,padding:"8px 12px",color:"#6b65a0",fontSize:11,cursor:"pointer"}}>Cancel</button>
          </div>}

          {/* Add New Customer Form */}
          {showAddCustomer&&<div style={{background:"#0e0d1a",border:"1px solid rgba(74,222,128,0.3)",borderRadius:10,padding:16,display:"flex",gap:10,alignItems:"flex-end",flexWrap:"wrap"}}>
            <div style={{flex:"1 1 250px"}}>
              <div style={{fontSize:10,color:"#4ade80",marginBottom:4,fontWeight:600}}>➕ Add New Customer</div>
              <input type="text" value={newCustomerName} onChange={e=>setNewCustomerName(e.target.value)} placeholder="e.g. Al Futtaim Group, Emirates NBD" autoFocus style={{width:"100%",background:"#12111e",border:"1px solid #2a2450",borderRadius:6,padding:"8px 12px",color:"#e0e6f0",fontSize:12,outline:"none"}} onKeyDown={e=>{if(e.key==="Enter"&&newCustomerName.trim())addNewCustomer(newCustomerName);}} />
            </div>
            <button onClick={()=>addNewCustomer(newCustomerName)} disabled={!newCustomerName.trim()} style={{background:"linear-gradient(135deg,#4ade80,#22c55e)",color:"#0a0b14",border:"none",borderRadius:6,padding:"8px 18px",fontSize:12,fontWeight:700,cursor:newCustomerName.trim()?"pointer":"default",opacity:newCustomerName.trim()?1:0.4}}>Add Customer</button>
            <button onClick={()=>{setShowAddCustomer(false);setNewCustomerName("");}} style={{background:"#12111e",border:"1px solid #2a2450",borderRadius:6,padding:"8px 12px",color:"#6b65a0",fontSize:11,cursor:"pointer"}}>Cancel</button>
          </div>}

          {/* Similar transactions — exact matching descriptions that appear 2+ times */}
          {descriptionGroups.length>0&&<div style={{background:"#0e0d1a",border:"1px solid #2a2450",borderRadius:10,padding:"10px 14px"}}>
            <div style={{fontSize:10,color:"#6b65a0",fontWeight:600,marginBottom:8}}>Recurring transactions ({descriptionGroups.length} groups)</div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {descriptionGroups.map(g=><button key={g.description} onClick={()=>setDescGroup(descGroup===g.description?"":g.description)} style={{
                background:descGroup===g.description?"rgba(6,182,212,0.15)":"#12111e",

                </tr></thead><tbody>{exp.map((e,i)=><tr key={i} style={{borderBottom:"1px solid #2a2450",background:i%2===0?"transparent":"rgba(18,17,30,0.6)"}}>
                  <td style={{padding:"6px 10px",color:"#4a4570",fontSize:10}}>{i+1}</td>
                  <td style={{padding:"6px 10px",fontFamily:"'IBM Plex Mono',monospace",fontSize:11}}>{e.date}</td>
                  <td style={{padding:"6px 10px",color:"#e0e6f0",fontSize:11}}>{e.account}</td>
                  <td style={{padding:"6px 10px",textAlign:"right",color:"#f87171",fontFamily:"'IBM Plex Mono',monospace",fontSize:11}}>{fmt(e.amount)}</td>
                  <td style={{padding:"6px 10px",color:"#a78bfa",fontSize:10}}>{e.paidThrough}</td>
                  <td style={{padding:"6px 10px",color:"#06b6d4",fontSize:10}}>{e.vendor||"—"}</td>
                  <td style={{padding:"6px 10px",color:"#8a82b8",fontSize:10,maxWidth:180,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.description}</td>
                </tr>)}</tbody></table></div></div>
            </div>}

            {/* Balance Sheet Items */}
            {bs.length>0&&<div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                <div style={{fontSize:14,fontWeight:600,color:"#06b6d4"}}>🏦 Balance Sheet Items ({Math.floor(bs.length/2)})</div>
                <button onClick={exportBSItems} style={{background:"rgba(6,182,212,0.1)",border:"1px solid rgba(6,182,212,0.3)",borderRadius:6,padding:"4px 12px",color:"#06b6d4",fontSize:10,fontWeight:600,cursor:"pointer"}}>Download CSV</button>
              </div>
              {renderJT(bs,"balance sheet")}
            </div>}

            {/* Journals */}
            {jnl.length>0&&<div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                <div style={{fontSize:14,fontWeight:600,color:"#a78bfa"}}>📒 Journal Entries ({Math.floor(jnl.length/2)})</div>
                <button onClick={exportJournals} style={{background:"rgba(167,139,250,0.1)",border:"1px solid rgba(167,139,250,0.3)",borderRadius:6,padding:"4px 12px",color:"#a78bfa",fontSize:10,fontWeight:600,cursor:"pointer"}}>Download CSV</button>
              </div>
              {renderJT(jnl,"journal")}
            </div>}

            {/* Payment Received */}
            {pr.length>0&&<div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                <div style={{fontSize:14,fontWeight:600,color:"#4ade80"}}>💰 Payment Received ({pr.length})</div>
                <button onClick={exportPaymentReceived} style={{background:"rgba(74,222,128,0.1)",border:"1px solid rgba(74,222,128,0.3)",borderRadius:6,padding:"4px 12px",color:"#4ade80",fontSize:10,fontWeight:600,cursor:"pointer"}}>Download CSV</button>
              </div>
              <div style={{borderRadius:10,border:"1px solid #2a2450",overflow:"hidden"}}><div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}><thead><tr style={{background:"#0e0d1a"}}>
                  {["#","Date","Customer","Amount","Payment Mode","Description","Deposit To"].map(h=><th key={h} style={{padding:"8px 10px",textAlign:h==="Amount"?"right":"left",color:"#6b65a0",fontWeight:600,borderBottom:"1px solid #2a2450",fontSize:11}}>{h}</th>)}
                </tr></thead><tbody>{pr.map((r,i)=><tr key={i} style={{borderBottom:"1px solid #2a2450",background:i%2===0?"transparent":"rgba(18,17,30,0.6)"}}>
                  <td style={{padding:"6px 10px",color:"#4a4570",fontSize:10}}>{i+1}</td>
                  <td style={{padding:"6px 10px",fontFamily:"'IBM Plex Mono',monospace",fontSize:11}}>{r.date}</td>
                  <td style={{padding:"6px 10px",color:"#4ade80",fontSize:11,fontWeight:600}}>{r.customerName}</td>
                  <td style={{padding:"6px 10px",textAlign:"right",color:"#4ade80",fontFamily:"'IBM Plex Mono',monospace",fontSize:11}}>{fmt(r.amount)}</td>
                  <td style={{padding:"6px 10px",color:"#a78bfa",fontSize:10}}>{r.paymentMode}</td>
                  <td style={{padding:"6px 10px",color:"#8a82b8",fontSize:10,maxWidth:180,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.description}</td>
                  <td style={{padding:"6px 10px",color:"#06b6d4",fontSize:10}}>{r.depositTo}</td>
                </tr>)}</tbody></table></div></div>
            </div>}

            {/* Suspense / Clarification List */}
            {sus.length>0&&<div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                <div style={{fontSize:14,fontWeight:600,color:"#fbbf24"}}>⚠ Suspense — Client Clarification ({sus.length})</div>
                <button onClick={exportSuspense} style={{background:"rgba(251,191,36,0.1)",border:"1px solid rgba(251,191,36,0.3)",borderRadius:6,padding:"4px 12px",color:"#fbbf24",fontSize:10,fontWeight:600,cursor:"pointer"}}>Download Excel</button>
              </div>
              <div style={{borderRadius:10,border:"1px solid rgba(251,191,36,0.2)",overflow:"hidden",background:"rgba(251,191,36,0.02)"}}>
                <div style={{padding:"12px 16px",borderBottom:"1px solid rgba(251,191,36,0.15)"}}>
                  <div style={{fontSize:13,fontWeight:600,color:"#e0e6f0"}}>{activeClientName}</div>
                  <div style={{fontSize:11,color:"#6b65a0",marginTop:2}}>Bank: {bankAccount} • Period: {transactions[0]?.date||""} to {transactions[transactions.length-1]?.date||""}</div>
                  <div style={{fontSize:10,color:"#fbbf24",marginTop:4}}>The following transactions could not be classified. Please provide the nature of each transaction.</div>
                </div>
                <div style={{overflowX:"auto"}}>
                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                    <thead><tr style={{background:"rgba(251,191,36,0.05)"}}>
                      {["#","Date","Description","Debit","Credit","Remarks of Client"].map(h=><th key={h} style={{padding:"8px 12px",textAlign:h==="Debit"||h==="Credit"?"right":"left",color:"#fbbf24",fontWeight:600,borderBottom:"1px solid rgba(251,191,36,0.15)",fontSize:11}}>{h}</th>)}
                    </tr></thead>
                    <tbody>
                      {sus.map((s,i)=><tr key={i} style={{borderBottom:"1px solid rgba(251,191,36,0.08)",background:i%2===0?"transparent":"rgba(251,191,36,0.02)"}}>
                        <td style={{padding:"6px 12px",color:"#4a4570",fontSize:10}}>{i+1}</td>
                        <td style={{padding:"6px 12px",fontFamily:"'IBM Plex Mono',monospace",fontSize:11}}>{s.date}</td>
                        <td style={{padding:"6px 12px",color:"#e0e6f0",fontSize:11}}>{s.description}</td>
                        <td style={{padding:"6px 12px",textAlign:"right",color:s.debit?"#f87171":"#3a3560",fontFamily:"'IBM Plex Mono',monospace",fontSize:11}}>{s.debit?fmt(s.debit):""}</td>
                        <td style={{padding:"6px 12px",textAlign:"right",color:s.credit?"#4ade80":"#3a3560",fontFamily:"'IBM Plex Mono',monospace",fontSize:11}}>{s.credit?fmt(s.credit):""}</td>
                        <td style={{padding:"6px 12px",color:"#4a4570",fontSize:10,minWidth:150}}></td>
                      </tr>)}
                      <tr style={{borderTop:"2px solid rgba(251,191,36,0.2)",fontWeight:600}}>
                        <td></td><td></td>
                        <td style={{padding:"8px 12px",color:"#fbbf24",fontSize:11}}>TOTAL</td>
                        <td style={{padding:"8px 12px",textAlign:"right",color:"#f87171",fontFamily:"'IBM Plex Mono',monospace",fontSize:11}}>{fmt(sus.reduce((s,t)=>s+(t.debit||0),0))}</td>
                        <td style={{padding:"8px 12px",textAlign:"right",color:"#4ade80",fontFamily:"'IBM Plex Mono',monospace",fontSize:11}}>{fmt(sus.reduce((s,t)=>s+(t.credit||0),0))}</td>
                        <td></td>
                      </tr>
                    </tbody>
                  </table>
                </div>
              </div>
            </div>}

            {/* Totals */}
            <div style={{display:"flex",justifyContent:"flex-end",gap:20,padding:"8px 16px",background:"#0e0d1a",borderRadius:8,border:"1px solid #2a2450",flexWrap:"wrap"}}>
              <span style={{fontSize:12,color:"#6b65a0"}}>P&L Expenses: <strong style={{color:"#f87171",fontFamily:"'IBM Plex Mono',monospace"}}>{currency} {fmt(exp.reduce((s,e)=>s+e.amount,0))}</strong></span>
              <span style={{fontSize:12,color:"#6b65a0"}}>BS Items: <strong style={{color:"#06b6d4",fontFamily:"'IBM Plex Mono',monospace"}}>{currency} {fmt(bs.reduce((s,e)=>s+e.debit,0)/2)}</strong></span>
              <span style={{fontSize:12,color:"#6b65a0"}}>Journals: <strong style={{color:"#a78bfa",fontFamily:"'IBM Plex Mono',monospace"}}>{currency} {fmt(jnl.reduce((s,e)=>s+e.debit,0)/2)}</strong></span>
              <span style={{fontSize:12,color:"#6b65a0"}}>Payments: <strong style={{color:"#4ade80",fontFamily:"'IBM Plex Mono',monospace"}}>{currency} {fmt(pr.reduce((s,r)=>s+r.amount,0))}</strong></span>
              {sus.length>0&&<span style={{fontSize:12,color:"#6b65a0"}}>Suspense: <strong style={{color:"#fbbf24",fontFamily:"'IBM Plex Mono',monospace"}}>{sus.length} items</strong></span>}
            </div>
            </>;
          })()}
        </div>)}

        {appMode==="bank"&&step===6&&(<div style={{textAlign:"center",padding:"60px 20px"}}>
          <div style={{fontSize:64,marginBottom:20}}>✅</div>
          <h2 style={{fontSize:26,fontWeight:700,marginBottom:8}}>Export Complete!</h2>
          <p style={{color:"#6b65a0",fontSize:14,maxWidth:500,margin:"0 auto 28px"}}>Files downloaded for <strong style={{color:"#4ade80"}}>{activeClientName}</strong>:</p>
          <div style={{display:"flex",gap:16,justifyContent:"center",flexWrap:"wrap",marginBottom:24}}>
            <div style={{background:"rgba(74,222,128,0.06)",border:"1px solid rgba(74,222,128,0.2)",borderRadius:10,padding:"16px 24px",textAlign:"center"}}>
              <div style={{fontSize:24,marginBottom:4}}>📋</div>
              <div style={{fontSize:13,fontWeight:600,color:"#4ade80"}}>Zoho Expenses</div>
              <div style={{fontSize:11,color:"#6b65a0"}}>{(journalEntries.expenses||[]).length} transactions</div>
            </div>
            <div style={{background:"rgba(167,139,250,0.06)",border:"1px solid rgba(167,139,250,0.2)",borderRadius:10,padding:"16px 24px",textAlign:"center"}}>
              <div style={{fontSize:24,marginBottom:4}}>📒</div>
              <div style={{fontSize:13,fontWeight:600,color:"#a78bfa"}}>Journals + Revenue</div>
              <div style={{fontSize:11,color:"#6b65a0"}}>{Math.floor(((journalEntries.journals||[]).length+(journalEntries.revenue||[]).length)/2)} entries</div>
            </div>
          </div>
          <div style={{display:"flex",gap:12,justifyContent:"center",flexWrap:"wrap"}}>
            <button onClick={()=>{setStep(1);setTransactions([]);setClassifiedTxns([]);setJournalEntries({expenses:[],journals:[],revenue:[]});setBankFileName("");setParseError("");}} style={{background:"#0e0d1a",border:"1px solid #2a2450",borderRadius:8,padding:"10px 24px",color:"#e0e6f0",fontSize:13,fontWeight:500,cursor:"pointer"}}>Process New Statement</button>
            <button onClick={exportExpenses} style={{background:"#12111e",border:"1px solid rgba(74,222,128,0.3)",borderRadius:8,padding:"10px 20px",color:"#4ade80",fontSize:12,fontWeight:600,cursor:"pointer"}}>Re-download Expenses</button>
            <button onClick={exportJournals} style={{background:"#12111e",border:"1px solid rgba(167,139,250,0.3)",borderRadius:8,padding:"10px 20px",color:"#a78bfa",fontSize:12,fontWeight:600,cursor:"pointer"}}>Re-download Journals</button>
          </div>
        </div>)}

        {/* ═══════════════ BILL ENTRY MODE (Paid only) ═══════════════ */}
        {appMode==="bills"&&isPaid&&(<div style={{display:"flex",flexDirection:"column",gap:20}}>
          <div>
            <h2 style={{fontSize:22,fontWeight:600,marginBottom:4}}>Bill Entry</h2>
            <p style={{color:"#6b65a0",fontSize:13}}>Upload invoices & bills — AI extracts fields automatically. Export as Zoho Bills import CSV.</p>
          </div>

          {/* Upload area */}
          <div style={{border:"2px dashed #2a2450",borderRadius:12,padding:32,textAlign:"center",background:"#0e0d1a",cursor:"pointer",transition:"all 0.2s"}} onClick={()=>billInputRef.current&&billInputRef.current.click()} onDragOver={e=>{e.preventDefault();e.currentTarget.style.borderColor="#a78bfa";}} onDragLeave={e=>{e.currentTarget.style.borderColor="#2a2450";}} onDrop={e=>{e.preventDefault();e.currentTarget.style.borderColor="#2a2450";handleBillUpload({target:{files:e.dataTransfer.files,value:""}});}}>
            <input ref={billInputRef} type="file" accept=".pdf,.png,.jpg,.jpeg,.webp" multiple onChange={handleBillUpload} style={{display:"none"}} />
            <div style={{fontSize:40,marginBottom:10}}>📄</div>
            <div style={{fontSize:15,fontWeight:600,color:"#c8bfff"}}>Upload Bills / Invoices</div>
            <div style={{fontSize:12,color:"#6b65a0",marginTop:4}}>PDF, PNG, JPG — drag & drop or click to browse</div>
            <div style={{fontSize:10,color:"#4a4570",marginTop:4}}>AI will extract Invoice Number, Vendor, Amount, VAT, and Total</div>
          </div>

          {/* Processing status */}
          {billProcessing&&<div style={{padding:16,background:"rgba(107,91,167,0.08)",border:"1px solid rgba(107,91,167,0.2)",borderRadius:10,display:"flex",alignItems:"center",gap:12}}>
            <div style={{width:20,height:20,border:"2px solid #a78bfa",borderTop:"2px solid transparent",borderRadius:"50%",animation:"spin 1s linear infinite"}} />
            <span style={{fontSize:13,color:"#a78bfa"}}>{billProgress||"Processing..."}</span>
          </div>}

          {/* Action bar */}
          {bills.length>0&&!billProcessing&&<div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
            {bills.some(b=>b.status==="pending")&&<button onClick={processAllBills} style={{background:"linear-gradient(135deg,#6B5BA7,#4B3D8F)",color:"#fff",border:"none",borderRadius:8,padding:"10px 20px",fontSize:12,fontWeight:600,cursor:"pointer"}}>🤖 Process All ({bills.filter(b=>b.status==="pending").length} pending)</button>}
            {bills.some(b=>b.confirmed)&&<button onClick={exportBillsCSV} style={{background:"linear-gradient(135deg,#4ade80,#22c55e)",color:"#0a0b14",border:"none",borderRadius:8,padding:"10px 20px",fontSize:12,fontWeight:700,cursor:"pointer"}}>📥 Export Zoho Bills CSV ({bills.filter(b=>b.confirmed).length})</button>}
            <button onClick={()=>setBills([])} style={{background:"#0e0d1a",border:"1px solid rgba(248,113,113,0.3)",borderRadius:8,padding:"10px 14px",fontSize:11,color:"#f87171",cursor:"pointer"}}>Clear All</button>
            <span style={{fontSize:11,color:"#4a4570"}}>{bills.length} bills — {bills.filter(b=>b.confirmed).length} confirmed</span>
          </div>}

          {/* Bill cards */}
          {bills.map(bill=>(
            <div key={bill.id} style={{border:"1px solid "+(bill.status==="error"?"rgba(248,113,113,0.3)":bill.confirmed?"rgba(74,222,128,0.3)":bill.status==="extracted"?"rgba(107,91,167,0.3)":"#2a2450"),borderRadius:12,overflow:"hidden",background:"#12111e"}}>
              {/* Header */}
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 16px",borderBottom:"1px solid #2a2450",background:"rgba(10,11,20,0.5)"}}>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <span style={{fontSize:16}}>{bill.status==="pending"?"📄":bill.status==="processing"?"⏳":bill.status==="error"?"❌":bill.confirmed?"✅":"📋"}</span>
                  <span style={{fontSize:13,fontWeight:600,color:"#e0e6f0"}}>{bill.fileName}</span>
                  <span style={{fontSize:9,padding:"2px 8px",borderRadius:4,fontWeight:600,
                    background:bill.status==="extracted"?"rgba(107,91,167,0.1)":bill.status==="error"?"rgba(248,113,113,0.1)":bill.confirmed?"rgba(74,222,128,0.1)":"rgba(251,191,36,0.1)",
                    color:bill.status==="extracted"?"#a78bfa":bill.status==="error"?"#f87171":bill.confirmed?"#4ade80":"#fbbf24"
                  }}>{bill.status==="pending"?"Pending":bill.status==="processing"?"Processing...":bill.status==="error"?"Error":bill.confirmed?"Confirmed":"Ready for review"}</span>
                </div>
                <div style={{display:"flex",gap:6}}>
                  {bill.status==="pending"&&<button onClick={()=>processBill(bill.id)} style={{background:"linear-gradient(135deg,#6B5BA7,#4B3D8F)",color:"#fff",border:"none",borderRadius:6,padding:"5px 12px",fontSize:10,fontWeight:600,cursor:"pointer"}}>🤖 Process</button>}
                  {bill.status==="extracted"&&!bill.confirmed&&<button onClick={()=>confirmBill(bill.id)} style={{background:"rgba(74,222,128,0.1)",border:"1px solid rgba(74,222,128,0.3)",borderRadius:6,padding:"5px 12px",fontSize:10,fontWeight:600,color:"#4ade80",cursor:"pointer"}}>✓ Confirm</button>}
                  <button onClick={()=>removeBill(bill.id)} style={{background:"rgba(248,113,113,0.06)",border:"1px solid rgba(248,113,113,0.2)",borderRadius:6,padding:"5px 10px",fontSize:10,color:"#f87171",cursor:"pointer"}}>Remove</button>
                </div>
              </div>

              {/* Error */}
              {bill.status==="error"&&<div style={{padding:"12px 16px",color:"#f87171",fontSize:12}}>{bill.description||"Processing failed"}</div>}

              {/* Extracted fields — editable form */}
              {(bill.status==="extracted"||bill.confirmed)&&(
                <div style={{padding:16,display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12}}>
                  <div>
                    <label style={{fontSize:10,color:"#6b65a0",display:"block",marginBottom:3}}>Invoice Number</label>
                    <input type="text" value={bill.invoiceNumber} onChange={e=>updateBillField(bill.id,"invoiceNumber",e.target.value)} disabled={bill.confirmed} style={{width:"100%",background:bill.confirmed?"#0e0d1a":"#0a0b14",border:"1px solid #2a2450",borderRadius:6,padding:"8px 10px",color:"#e0e6f0",fontSize:12,outline:"none",fontFamily:"'IBM Plex Mono',monospace"}} />
                  </div>
                  <div>
                    <label style={{fontSize:10,color:"#6b65a0",display:"block",marginBottom:3}}>Vendor Name</label>
                    <input type="text" value={bill.vendorName} onChange={e=>updateBillField(bill.id,"vendorName",e.target.value)} disabled={bill.confirmed} style={{width:"100%",background:bill.confirmed?"#0e0d1a":"#0a0b14",border:"1px solid #2a2450",borderRadius:6,padding:"8px 10px",color:"#e0e6f0",fontSize:12,outline:"none"}} />
                  </div>
                  <div>
                    <label style={{fontSize:10,color:"#6b65a0",display:"block",marginBottom:3}}>Bill Date</label>
                    <input type="text" value={bill.date} onChange={e=>updateBillField(bill.id,"date",e.target.value)} disabled={bill.confirmed} placeholder="DD-MM-YYYY" style={{width:"100%",background:bill.confirmed?"#0e0d1a":"#0a0b14",border:"1px solid #2a2450",borderRadius:6,padding:"8px 10px",color:"#e0e6f0",fontSize:12,outline:"none",fontFamily:"'IBM Plex Mono',monospace"}} />
                  </div>
                  <div style={{gridColumn:"1/4"}}>
                    <label style={{fontSize:10,color:"#6b65a0",display:"block",marginBottom:3}}>Description</label>
                    <input type="text" value={bill.description} onChange={e=>updateBillField(bill.id,"description",e.target.value)} disabled={bill.confirmed} style={{width:"100%",background:bill.confirmed?"#0e0d1a":"#0a0b14",border:"1px solid #2a2450",borderRadius:6,padding:"8px 10px",color:"#e0e6f0",fontSize:12,outline:"none"}} />
                  </div>
                  <div>
                    <label style={{fontSize:10,color:"#6b65a0",display:"block",marginBottom:3}}>Subtotal</label>
                    <input type="number" value={bill.subtotal} onChange={e=>updateBillField(bill.id,"subtotal",parseFloat(e.target.value)||0)} disabled={bill.confirmed} style={{width:"100%",background:bill.confirmed?"#0e0d1a":"#0a0b14",border:"1px solid #2a2450",borderRadius:6,padding:"8px 10px",color:"#e0e6f0",fontSize:12,outline:"none",fontFamily:"'IBM Plex Mono',monospace"}} />
                  </div>
                  <div>
                    <label style={{fontSize:10,color:"#6b65a0",display:"block",marginBottom:3}}>VAT / Tax</label>
                    <input type="number" value={bill.vat} onChange={e=>updateBillField(bill.id,"vat",parseFloat(e.target.value)||0)} disabled={bill.confirmed} style={{width:"100%",background:bill.confirmed?"#0e0d1a":"#0a0b14",border:"1px solid #2a2450",borderRadius:6,padding:"8px 10px",color:"#fbbf24",fontSize:12,outline:"none",fontFamily:"'IBM Plex Mono',monospace"}} />
                  </div>
                  <div>
                    <label style={{fontSize:10,color:"#6b65a0",display:"block",marginBottom:3}}>Total Amount</label>
                    <input type="number" value={bill.totalAmount} onChange={e=>updateBillField(bill.id,"totalAmount",parseFloat(e.target.value)||0)} disabled={bill.confirmed} style={{width:"100%",background:bill.confirmed?"#0e0d1a":"#0a0b14",border:"1px solid #2a2450",borderRadius:6,padding:"8px 10px",color:"#4ade80",fontSize:12,outline:"none",fontWeight:600,fontFamily:"'IBM Plex Mono',monospace"}} />
                  </div>
                </div>
              )}
            </div>
          ))}

          {/* Empty state */}
          {bills.length===0&&<div style={{textAlign:"center",padding:"40px 20px",color:"#4a4570"}}>
            <div style={{fontSize:14,marginBottom:8}}>No bills uploaded yet</div>
            <div style={{fontSize:11}}>Upload a PDF or image of an invoice/bill to get started</div>
          </div>}

          {/* Manual entry option */}
          <div style={{borderTop:"1px solid #2a2450",paddingTop:16}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <div style={{fontSize:13,fontWeight:600,color:"#c8bfff"}}>Manual Bill Entry</div>
              <button onClick={()=>{setBills(prev=>[...prev,{id:crypto.randomUUID(),file:null,fileName:"Manual Entry",status:"extracted",invoiceNumber:"",vendorName:"",subtotal:0,vat:0,totalAmount:0,date:"",description:"",ocrText:"",confirmed:false}]);}} style={{background:"#0e0d1a",border:"1px solid #2a2450",borderRadius:6,padding:"6px 14px",fontSize:11,color:"#a78bfa",cursor:"pointer",fontWeight:600}}>+ Add Manual Bill</button>
            </div>
            <div style={{fontSize:10,color:"#4a4570"}}>Enter bill details manually without uploading a document. Click "Add Manual Bill" to add a blank entry.</div>
          </div>

          {/* Export info */}
          <div style={{background:"#0e0d1a",border:"1px solid #2a2450",borderRadius:10,padding:14}}>
            <div style={{fontSize:11,fontWeight:600,color:"#6b65a0",marginBottom:4}}>📋 Zoho Bills Import Format</div>
            <div style={{fontSize:10,color:"#4a4570"}}>Exported CSV follows Zoho Books bill import format: Bill Number, Vendor Name, Bill Date, Due Date, Item Name, Item Description, Account, Quantity, Rate, Tax, Item Total, Currency Code. Import via Zoho Books → Bills → Import Bills.</div>
          </div>
        </div>)}

        {/* Bill Entry locked message for Free users */}
        {appMode==="bills"&&!isPaid&&(<div style={{textAlign:"center",padding:"80px 20px"}}>
          <div style={{fontSize:48,marginBottom:16}}>🔒</div>
          <h2 style={{fontSize:22,fontWeight:600,marginBottom:8}}>Bill Entry — Paid Version Feature</h2>
          <p style={{color:"#6b65a0",fontSize:13,marginBottom:24,maxWidth:400,margin:"0 auto 24px"}}>Upload invoices and bills with AI-powered OCR extraction. Available in the Paid Version.</p>
          <button onClick={()=>{if(confirm("Upgrade this client to Paid Version?"))upgradeClient();}} style={{background:"linear-gradient(135deg,#6B5BA7,#4B3D8F)",color:"#fff",border:"none",borderRadius:8,padding:"12px 32px",fontSize:14,fontWeight:600,cursor:"pointer"}}>Upgrade to Paid Version</button>
        </div>)}
        </>)}
      </div>
    </div>
  );
}
class ErrorBoundary extends React.Component{
  constructor(p){super(p);this.state={hasError:false,error:null};}
  static getDerivedStateFromError(e){return{hasError:true,error:e};}
  render(){
    if(this.state.hasError)return React.createElement("div",{style:{padding:40,textAlign:"center",color:"#f87171",background:"#0a0b14",minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16}},
      React.createElement("div",{style:{fontSize:48}},"⚠️"),
      React.createElement("h2",{style:{fontSize:20,color:"#e0e6f0"}},"AutoLedger encountered an error"),
      React.createElement("pre",{style:{fontSize:12,color:"#f87171",maxWidth:600,overflow:"auto",padding:16,background:"#12111e",borderRadius:8}},String(this.state.error)),
      React.createElement("button",{onClick:()=>{try{localStorage.clear();}catch(e){}window.location.reload();},style:{background:"#6B5BA7",color:"#fff",border:"none",borderRadius:8,padding:"10px 24px",fontSize:13,cursor:"pointer"}},"Clear Data & Reload")
    );
    return this.props.children;
  }
}
window.startAutoLedger = function() { ReactDOM.render(React.createElement(ErrorBoundary,null,React.createElement(App)),document.getElementById("root")); };
</script>
